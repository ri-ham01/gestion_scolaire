{% extends 'base_admin.html' %}
{% block title %}Modifier Professeur - EduNova{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-chalkboard-user text-primary me-2"></i> Modifier le professeur</h2>
        <a href="{{ url_for('admin.professeurs') }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i> Retour
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nom <span class="text-danger">*</span></label>
                        <input type="text" name="nom" class="form-control" value="{{ prof.nom }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Prénom <span class="text-danger">*</span></label>
                        <input type="text" name="prenom" class="form-control" value="{{ prof.prenom }}" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Grade</label>
                        <input type="text" name="grade" class="form-control" value="{{ prof.grade or '' }}">
                    </div>

                    <div class="col-md-6"></div>
                    
                    <div class="col-md-6">
                        <label class="form-label">Date de Naissance</label>
                        <input type="date" name="date_naissance" class="form-control" 
                               value="{{ prof.date_naissance.strftime('%Y-%m-%d') if prof.date_naissance else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Lieu de Naissance</label>
                        <input type="text" name="lieu_naissance" class="form-control" value="{{ prof.lieu_naissance or '' }}">
                    </div>
                </div>

                <div class="mt-4 text-end">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="fas fa-save me-2"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
