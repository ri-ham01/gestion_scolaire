{% extends 'base.html' %}
{% block title %}Erreur {{ code }} — EduNova{% endblock %}

{% block content %}
<section
  style="min-height: 80vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem;">
  <div class="card glass-card" style="max-width: 600px; padding: 4rem 2rem;">
    <div
      style="font-size: 6rem; font-weight: 800; color: var(--c-nova-cyan); line-height: 1; margin-bottom: 1rem; text-shadow: 0 0 20px rgba(6, 182, 212, 0.5);">
      {{ code }}
    </div>
    <h2 style="margin-bottom: 1.5rem;">Oups ! Quelque chose s'est mal passé.</h2>
    <p class="text-muted" style="margin-bottom: 2rem; font-size: 1.1rem;">
      {{ message }}
    </p>
    <a href="{{ url_for('public.index') }}" class="btn btn-primary">
      <i class="fa-solid fa-house"></i> Retour à l'accueil
    </a>
  </div>
</section>
{% endblock %}
